[message_title_model_importer_loading_failed]
src = "{importer} Loading Failed"
loc = "{importer} 読み込み失敗"

[error_package_corrupted_by_antivirus]
src = """
**{package_name}** package is corrupted by antivirus (e.g. Windows Defender).

Antiviruses update frequently, try again later, or consider whitelisting paths:

- `{package_folder_path}`
- `{xxmi_deployment_path}`

Error: {error_text}

This is likely a [false positive]({false_positive_link}). Libraries are built from [open source]({repo_link}) using [GitHub Actions]({github_actions_link}) and downloaded from [GitHub releases]({releases_link}).
"""
loc = """
**{package_name}** パッケージがウイルス対策ソフト (例: Windows Defender) によって破損しています。

ウイルス対策ソフトは頻繁に更新されるため、しばらくしてから再試行するか、以下のパスをホワイトリストに登録してください:

- `{package_folder_path}`
- `{xxmi_deployment_path}`

Error: {error_text}

これはおそらく[誤検知]({false_positive_link})です。ライブラリは[GitHub Actions]({github_actions_link})を使用して[オープンソース]({repo_link})からビルドされ、[GitHub Releases]({releases_link})からダウンロードされます。
"""

[error_title_package_corrupted_by_antivirus]
src = "Data Corruption Detected"
loc = "データ破損検出"

[error_xxmi_libs_package_corruption]
src = """
**XXMI Libraries** package is corrupted.

Details: {error_text}
"""
loc = """
**XXMI Libraries** パッケージが破損しています。

詳細: {error_text}
"""

[message_title_package_repair]
src = "Package Repair Available"
loc = "パッケージの修復が利用可能"

[message_text_package_repair]
src = """
{error_text}

Would you like to repair the package automatically?
"""
loc = """
{error_text}

パッケージを自動的に修復しますか?
"""

[message_button_repair_package]
src = "Repair"
loc = "修復"

[error_title_package_download_failed]
src = "{package} Package Download Failed"
loc = "{package} パッケージダウンロード失敗"

[error_title_package_install_failed]
src = "{package} Package Installation Failed"
loc = "{package} パッケージインストール失敗"
