[general_settings_mesh_lod_offset_tooltip]
src = """
## Controls LoD meshes deploying behavior (when full animated models are replaced with simplified ones):

* Default is **-10**, known range where full mesh remains always loaded is from **-1** to **-12** (depending on PC).
* Mods are currently created for full meshes and cannot (easily) be applied to LoDs.
"""
loc = """
## Управляет политикой применения LOD моделей (когда полные анимированные модели заменяют упрощёнными):

* По умолчанию **-10**, известный диапазон для загрузки полных моделей - от **-1** до **-12** (зависит от ПК).
* Моды в настоящее время создаются для полных моделей и не могут быть применены к LoD'ам (без изменения архитектуры).
"""

[general_settings_texture_boost_entry_tooltip]
src = """
## Controls how aggressively higher-resolution textures are pushed to VRAM:

Serves as a multiplier to streaming priorities configured for textures.

* If modded textures are not loading, try increasing it to **25** or **30**.
    - ⚡ Too high values may increase VRAM usage and can cause stuttering if the pool is small.

This value may require fine tuning to minimize modded textures loading delay:

* Start tuning with **20.0** **(default)**.
    - ✅ This baseline value should work for most PCs.

* If modded textures are loading fine, gradually decrease until small textures (like eyes) start breaking.
    - ✅ A value just above this “breaking point” typically gives minimal texture loading delay while staying VRAM-friendly.
"""
loc = """
## Управляет агрессивностью загрузки текстур высокого разрешения в видеопамять (VRAM):

Выступает в роли множителя для приоретитов загрузки настроенных для текстур.

* Если текстуры модов **не** загружаются, попробуйте увеличить значение до **25** или **30**.
    - ⚡ Чем выше значение, тем больше потребление видеопамяти, вплоть до тормозов при нехватке места в пуле.

Для тонкой настройки под конкретный ПК (для снижения задержки загрузки текстур модов):

* Начните подбор с **20.0** **(по умолчанию)**.
    - ✅ Это значение должно работать для большинства ПК.

* Если текстуры модов **загружаются** без проблем, попробуйте уменьшить значение вплоть до поломки текстур на глазах персонажей.
    - ✅ Значение немного выше того, когда отображение текстур ломается, должно дать минимальную задержку загрузки текстур.
"""

[general_settings_texture_min_boost_entry_tooltip]
src = """
## Defines a minimum streaming priority for textures:

Values above **0** **(default)** set a priority floor that texture streaming priorities cannot go below.

- ⚡ Use only if modded textures aren't loading regardless configured **Texture Boost** value.
- ⚡ Same as with **Texture Boost**, always look for small textures (like eyes) when tuning the value.
"""
loc = """
## Задаёт минимальный приоритет загрузки текстур:

Значения выше 0 (по умолчанию) определяют уровень, ниже которого приоритеты загрузки не могут опуститься.

- ⚡ Используйте только если настройка опции **Ускорение текстур** не позволяет добиться корректной работы текстур модов.
- ⚡ Также, как и в случае с опцией **Ускорение текстур**, для настройки значения ориентируйтесь на загрузку текстур глаз.
"""

[general_settings_use_all_mips_tooltip]
src = """
## Controls whether texture resolution limits are applied:

* **Enabled** **(default)**: Disable resolution restrictions from LOD Bias.
    - ✅ Allows to load full resolution textures at cost of higher VRAM usage.
    - ⚡ If it has no effect or consumes too much VRAM, try to enable **Max LOD Bias** instead.

* **Disabled**: Enable resolution restrictions from LOD Bias.
    - ⚡ Modded textures won't load if disabled without Max (Ultra High) LOD Bias enabled.
"""
loc = """
## Управляет пределом разрешения текстур LOD'ов:

* **Включено** **(по умолчанию)**: Снимает ограничения разрешения, накладываемые LOD Bias'ом.
    - ✅ Позволяет игре загружать текстуры высокого разрешения ценой увеличения исползования видеопамяти (VRAM):
    - ⚡ Если эта опция не имеет эффекта или потребляет слишком много видеопамяти, попробуйте вместо неё включить **Max LOD Bias**.

* **Отключено**: Не влияет на ограничения разрешения, накладываемые LOD Bias'ом.
    - ⚡ Текстуры модов не будут загружаться, если обе опциии (эта и **Макс. LOD Bias**) отключены.
"""

[general_settings_texture_streaming_pool_size_entry_tooltip]
src = """
## Controls how much VRAM the game can use for textures:

* Set to **0** **(default)** for **automatic control** (based on available VRAM).
* Set to specific value (e.g. 4096) for precise VRAM management.
"""
loc = """
## Управляет объёмом видеопамяти (VRAM), доступной для текстур:

* Установите **0** **(по умолчанию)** для **автоматического управления** (на основе доступной VRAM).
* Установите конкретное значение (например, 4096), чтобы точно задать объём VRAM.
"""

[general_settings_texture_streaming_limit_pool_checkbox_tooltip]
src = """
## Sets the upper limit for how much VRAM the game can use for textures:

* **Enabled** **(default)** – Limits texture pool size based on your GPU's available VRAM.
    - ✅ Helps prevent crashes or stuttering on low VRAM systems.
    - ⚡ May reduce texture quality or cause pop-ins if too restrictive on high-end GPUs.

* **Disabled** – Unlocks maximum texture pool size, even if it exceeds your GPU's safe limits.
    - ✅ Can improve texture quality and reduce pop-ins on powerful systems.
    - ⚡ Risk of performance drops, stutters, or crashes if VRAM runs out.
"""
loc = """
## Устанавливает верхний предел VRAM, доступный для текстур:

* **Включено** **(по умолчанию)** – ограничивает размер пула текстур объёмом VRAM вашей видеокарты.
    - ✅ Помогает избежать сбоев и лагов на системах с малым объёмом VRAM.
    - ⚡ Может снизить качество или вызвать подгрузки на мощных системах.

* **Отключено** – снимает ограничение, даже если это превышает безопасные пределы VRAM.
    - ✅ Повышает качество текстур и снижает подгрузки на мощных системах.
    - ⚡ При нехватке VRAM возможны тормоза и краши.
"""

[general_settings_texture_streaming_fixed_pool_size_checkbox_tooltip]
src = """
## Controls automatic pool size grow/shrink capabilities:

* **Enabled** **(default)** – Locks texture pool size to value calculated on game start.
    - ✅ Eliminates modded textures loading delay by minimizing texture mip levels pop in/out.
    - ⚡ Pool size is locked on game start, low end GPU users may want to close as much apps as possible.

* **Disabled** – Allows game engine to dynamically resize pool.
    - ✅ Provides more freedom to both engine (allows mips streaming) and user (no need to close apps).
    - ⚡ Introduces short delay to modded textures loading unless **Texture Boost** values is perfectly tuned.
"""
loc = """
## Управляет возможностью автоматического увеличения/уменьшения размера пула текстур:

* **Включено** **(по умолчанию)** – Фиксирует размер пула на значении, расчитанном при запуске игры.
    - ✅ Убирает задержку загрузки текстур модов путём устранения неопределённости в размере пула.
    - ⚡ Размер пула замораживается при старте игры. Для слабых видеокарт рекомендуется закрыть все лишние программы перед запуском игры.

* **Отключено** – Позволяет игре динамически менять размер пула.
    - ✅ Даёт больше свободы как движку (в загрузке текстур), так и игроку (не нужно закрывать другие программы).
    - ⚡ Появляется небольшая задержка загрузки текстур модов, если **Ускорение текстур** не было тонко настроено вручную.
"""
